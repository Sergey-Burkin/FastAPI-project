version: '3.8'

services:
  db:
    image: postgres:15
    container_name: shortener_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: shortener
    ports:
      - "5434:5432"

  redis:
    image: redis:7
    container_name: shortener_redis
    ports:
      - "6379:6379"

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: shortener_app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      POSTGRES_DSN: postgresql+asyncpg://user:pass@db:5432/shortener
      REDIS_DSN: redis://redis:6379/0
    volumes:
      - ../app:/app

volumes:
  postgres_data: